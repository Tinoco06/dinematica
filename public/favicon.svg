<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 70" width="32" height="28">
  <!-- Dinemática icon: 23 dots on 8×7 grid -->
  <!-- Fila 0 -->
  <circle cx="25" cy="5" r="5" fill="#FF5E27"/>
  <circle cx="35" cy="5" r="5" fill="#FF5E27"/>
  <circle cx="55" cy="5" r="5" fill="#FF5E27"/>
  <circle cx="65" cy="5" r="5" fill="#FF5E27"/>
  <!-- Lateral izquierdo superior -->
  <circle cx="15" cy="15" r="5" fill="#FF5E27"/>
  <circle cx="15" cy="25" r="5" fill="#FF5E27"/>
  <!-- Lateral derecho superior -->
  <circle cx="75" cy="15" r="5" fill="#FF5E27"/>
  <circle cx="75" cy="25" r="5" fill="#FF5E27"/>
  <!-- Centro -->
  <circle cx="45" cy="25" r="5" fill="#FF5E27"/>
  <circle cx="55" cy="25" r="5" fill="#FF5E27"/>
  <circle cx="35" cy="35" r="5" fill="#FF5E27"/>
  <circle cx="45" cy="35" r="5" fill="#FF5E27"/>
  <circle cx="55" cy="35" r="5" fill="#FF5E27"/>
  <circle cx="35" cy="45" r="5" fill="#FF5E27"/>
  <circle cx="45" cy="45" r="5" fill="#FF5E27"/>
  <!-- Lateral izquierdo inferior -->
  <circle cx="15" cy="45" r="5" fill="#FF5E27"/>
  <circle cx="15" cy="55" r="5" fill="#FF5E27"/>
  <!-- Lateral derecho inferior -->
  <circle cx="75" cy="45" r="5" fill="#FF5E27"/>
  <circle cx="75" cy="55" r="5" fill="#FF5E27"/>
  <!-- Fila 6 -->
  <circle cx="25" cy="65" r="5" fill="#FF5E27"/>
  <circle cx="35" cy="65" r="5" fill="#FF5E27"/>
  <circle cx="55" cy="65" r="5" fill="#FF5E27"/>
  <circle cx="65" cy="65" r="5" fill="#FF5E27"/>
</svg>
